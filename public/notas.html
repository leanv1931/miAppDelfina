<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentos Especiales - Delfina</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Momentos Especiales de Delfina</h1>
        <nav class="navigation">
            <a href="/" class="nav-link">Volver al Inicio</a>
        </nav>
        
        <!-- Sistema de notas -->
        <div class="notas-container">
            <h2>Momentos Especiales</h2>
            <form id="nota-form">
                <input type="text" id="nota-titulo" placeholder="Título del momento" required>
                <textarea id="nota-contenido" placeholder="Describe este momento especial" required></textarea>
                <button type="submit" id="guardar-nota">Guardar Momento</button>
            </form>
            <div id="lista-notas"></div>
        </div>
    </div>
    <script src="../src/App.js"></script>
</body>
</html>
