<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas - Delfina</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <h1>Notas de Delfina</h1>
        
        <form id="notaForm" class="nota-form">
            <textarea 
                id="notaTexto" 
                placeholder="Escribe una nota, ej: ir al pediatra..."
                rows="4"
                required
            ></textarea>
            <button type="submit" class="button">Guardar Nota</button>
        </form>

        <div id="notasGuardadas" class="notas-lista">
            <!-- Aquí se mostrarán las notas guardadas -->
        </div>

        <div class="button-container">
            <a href="/" class="button button-secondary">Volver al Inicio</a>
        </div>
    </div>

    <script>
        // 🔌 CONCEPTO: Conectar Frontend con Backend
        // En lugar de usar localStorage, ahora usamos la API como fuente de verdad
        
        let notas = []; // Array vacío - se llenará desde la API

        // 📡 CONCEPTO: Cargar datos desde el servidor al iniciar
        async function cargarNotasDesdeAPI() {
            try {
                const response = await fetch('/api/notes');
                const data = await response.json();
                
                // 🔄 CONCEPTO: Transformar datos del servidor al formato del frontend
                notas = data.notes.map(nota => ({
                    id: nota.id,
                    texto: nota.text,  // API usa "text", frontend usa "texto"
                    fecha: new Date(nota.createdAt).toLocaleDateString()
                }));
                
                mostrarNotas();
            } catch (error) {
                console.error('Error cargando notas:', error);
            }
        }

        // 💾 CONCEPTO: Guardar nueva nota en el servidor
        document.getElementById('notaForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const textoNota = document.getElementById('notaTexto').value.trim();
            if (textoNota) {
                try {
                    // 📤 CONCEPTO: Enviar datos al servidor (POST)
                    const response = await fetch('/api/notes', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: textoNota })
                    });
                    
                    const data = await response.json();
                    
                    // 🔄 CONCEPTO: Actualizar la UI con la respuesta del servidor
                    const nuevaNota = {
                        id: data.note.id,
                        texto: data.note.text,
                        fecha: new Date(data.note.createdAt).toLocaleDateString()
                    };
                    
                    notas.unshift(nuevaNota);
                    document.getElementById('notaTexto').value = '';
                    mostrarNotas();
                    
                } catch (error) {
                    console.error('Error guardando nota:', error);
                }
            }
        });

        // 🖼️ CONCEPTO: Mostrar datos en la UI (sin cambios)
        function mostrarNotas() {
            const container = document.getElementById('notasGuardadas');
            
            if (notas.length === 0) {
                container.innerHTML = '<p class="no-notas">No hay notas guardadas</p>';
                return;
            }

            container.innerHTML = notas.map(nota => `
                <div class="nota-item">
                    <p class="nota-texto">${nota.texto}</p>
                    <small class="nota-fecha">${nota.fecha}</small>
                </div>
            `).join('');
        }

        // 🚀 CONCEPTO: Inicializar la aplicación
        cargarNotasDesdeAPI();
    </script>
</body>
</html>
