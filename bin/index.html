<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenida Delfina</title>

  <!-- Descripción corta (máx. 160 caracteres) -->
  <meta name="description" content="Bienvenida Delfina - Una página especial para compartir este momento con familia y amigos.">

  <!-- Palabras clave (Google ya no las usa mucho, pero otros buscadores sí) -->
  <meta name="keywords" content="Delfina, bienvenida, bebé, familia, amigos, Leandro Valenzuela">

  <!-- Autor -->
  <meta name="author" content="Leandro Valenzuela">

  <!-- Para redes sociales (Open Graph) -->
  <meta property="og:title" content="Bienvenida Delfina - Página Oficial">
  <meta property="og:description" content="Una página especial para celebrar la llegada de Delfina con familia y amigos.">
  <meta property="og:image" content="https://mi-app-delfina.vercel.app/bebe.jpg">
  <meta property="og:url" content="https://mi-app-delfina.vercel.app">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Bienvenida, Delfina!</h1>
    <img src="bebe.jpg" alt="Foto de Delfina" class="bebe-foto">
    <p>¡hola mundo!</p>

    <p id="contador" class="contador"></p>

    <script>
  (function () {
    // Hoy, a medianoche (para evitar problemas de huso horario)
    const hoy = new Date();
    hoy.setHours(0, 0, 0, 0);

    // Cumple 2026 (Buenos Aires es -03:00, pero calculamos en local y a medianoche)
    const cumple2026 = new Date(2026, 6, 21); // Mes 6 = julio (0-based)
    cumple2026.setHours(0, 0, 0, 0);

    const MS_POR_DIA = 24 * 60 * 60 * 1000;
    // ceil para contar días restantes sin quedar en 0 por diferencias de horas
    const diasRestantes = Math.max(0, Math.ceil((cumple2026 - hoy) / MS_POR_DIA));

    const texto = diasRestantes === 1
      ? `Falta ${diasRestantes} día para mi cumple 🎂`
      : `Faltan ${diasRestantes} días para mi cumple 🎂`;

    document.getElementById('contador').textContent = texto;
  })();
</script>


  </div>
</body>
</html>
